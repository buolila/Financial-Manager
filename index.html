<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام المحاسبة السحابي الاحترافي</title>
    <style>
        /* الأساسيات والخط */
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap');

        :root {
            --primary-color: #4a69bd;
            --secondary-color: #6a89cc;
            --success-color: #1dd1a1;
            --danger-color: #ff6b6b;
            --bg-color: #f1f2f6;
            --text-color: #2f3542;
            --card-bg: #ffffff;
            --border-radius: 12px;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        /* الحاوية الرئيسية */
        .container {
            max-width: 1000px;
            margin: auto;
        }

        /* الهيدر */
        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: var(--primary-color);
            margin-bottom: 5px;
            font-weight: 700;
        }

        .header p {
            color: #747d8c;
            margin-top: 0;
        }

        /* كروت الإحصائيات (Dashboard) */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background-color: var(--card-bg);
            padding: 25px;
            border-radius: var(--border-radius);
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px rgba(0,0,0,0.1);
        }

        .card-title {
            font-size: 14px;
            color: #a4b0be;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .card-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--text-color);
        }

        .card-value.income { color: var(--success-color); }
        .card-value.expense { color: var(--danger-color); }
        .card-value.balance { color: var(--primary-color); }

        /* تزيين الكروت بلمسة لونية */
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 5px;
            height: 100%;
        }
        .income-card::before { background-color: var(--success-color); }
        .expense-card::before { background-color: var(--danger-color); }
        .balance-card::before { background-color: var(--primary-color); }

        /* منطقة الإدخال */
        .input-section {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: var(--border-radius);
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }

        .input-title {
            margin-bottom: 15px;
            font-weight: 600;
            color: var(--primary-color);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr auto;
            gap: 15px;
        }

        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; }
        }

        input, select {
            padding: 12px 15px;
            border: 1px solid #dfe4ea;
            border-radius: 8px;
            font-family: 'Cairo', sans-serif;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--secondary-color);
            box-shadow: 0 0 0 3px rgba(106, 137, 204, 0.1);
        }

        button.btn-add {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-family: 'Cairo', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button.btn-add:hover {
            background-color: #3c569b;
        }

        /* ستايل زر الحذف الجديد */
        .btn-delete {
            background-color: #fff;
            color: var(--danger-color);
            border: 1px solid var(--danger-color);
            padding: 5px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            font-size: 12px;
            transition: 0.3s;
        }

        .btn-delete:hover {
            background-color: var(--danger-color);
            color: #fff;
        }

        /* جدول العمليات */
        .table-section {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: var(--border-radius);
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .table-title {
            margin-bottom: 15px;
            font-weight: 600;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        th, td {
            text-align: right;
            padding: 15px;
            border-bottom: 1px solid #f1f2f6;
        }

        th {
            color: #a4b0be;
            font-weight: 600;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background-color: #f8f9fa;
        }

        .amount-tag {
            font-weight: 700;
            padding: 4px 8px;
            border-radius: 6px;
        }

        .amount-income { background-color: #e3faf3; color: var(--success-color); }
        .amount-expense { background-color: #ffefef; color: var(--danger-color); }

    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>المدير المالي</h1>
        <p>بوابتك الذكية لتتبع الإيرادات والمصروفات</p>
    </div>

       <div class="stats-grid">
        <div class="card income-card">
            <div class="card-title">إجمالي الإيرادات</div>
            <div class="card-value income"><span id="total-income">0.00</span> ج.م</div>
        </div>
        <div class="card expense-card">
            <div class="card-title">إجمالي المصروفات</div>
            <div class="card-value expense"><span id="total-expenses">0.00</span> ج.م</div>
        </div>
        <div class="card balance-card">
            <div class="card-title">صافي الربح الحالي</div>
            <div class="card-value balance"><span id="net-profit">0.00</span> ج.م</div>
        </div>
    </div>

    <div class="input-section">
        <div class="input-title">إضافة عملية جديدة</div>
        <form id="transaction-form" class="form-grid">
            <input type="text" id="desc" placeholder="وصف العملية (مثلاً: فاتورة مبيعات، إيجار المكتب)" required>
            <input type="number" id="amount" placeholder="المبلغ" required step="0.01">
            <select id="type">
                <option value="income">إيراد (+)</option>
                <option value="expense">مصروف (-)</option>
            </select>
            <button type="submit" class="btn-add">إضافة</button>
        </form>
    </div>

    <div class="table-section">
        <div class="table-title">سجل العمليات الأخير</div>
        <table>
            <thead>
                <tr>
                    <th>تاريخ العملية</th>
                    <th>الوصف</th>
                    <th>المبلغ</th>
                    <th>النوع</th>
                    <th>إجراء</th>
                </tr>
            </thead>
            <tbody id="table-body">
                </tbody>
        </table>
    </div>
</div>

<script>
    const form = document.getElementById('transaction-form');
    const tableBody = document.getElementById('table-body');
    
    // محاكاة لذاكرة (LocalStorage)
    let transactions = JSON.parse(localStorage.getItem('transactions')) || [];

    // وظيفة لتنسيق الأرقام
    function formatMoney(amount) {
        return amount.toFixed(2).replace(/\d(?=(\d{3})+\.)/g, '$&,');
    }

    function updateDashboard() {
        let totalIncome = 0;
        let totalExpenses = 0;

        transactions.forEach(tx => {
            if (tx.type === 'income') {
                totalIncome += tx.amount;
            } else {
                totalExpenses += tx.amount;
            }
        });

        document.getElementById('total-income').innerText = formatMoney(totalIncome);
        document.getElementById('total-expenses').innerText = formatMoney(totalExpenses);
        document.getElementById('net-profit').innerText = formatMoney(totalIncome - totalExpenses);
        
        localStorage.setItem('transactions', JSON.stringify(transactions));
    }

    // وظيفة الحذف الجديدة
    function deleteTransaction(index) {
        if(confirm("هل أنت متأكد من حذف هذه العملية؟")) {
            transactions.splice(index, 1); // حذف العنصر من المصفوفة
            renderTable(); // إعادة بناء الجدول
            updateDashboard(); // تحديث الأرقام في الأعلى
        }
    }

    function renderTable() {
        tableBody.innerHTML = '';
        // نقوم برسم الجدول مع إعطاء كل زر حذف رقم الـ Index الخاص به
        transactions.forEach((tx, index) => {
            const isIncome = tx.type === 'income';
            const row = `<tr>
                <td style="color: #747d8c;">${tx.date}</td>
                <td style="font-weight: 600;">${tx.desc}</td>
                <td><span class="amount-tag ${isIncome ? 'amount-income' : 'amount-expense'}">${isIncome ? '+' : '-'}${formatMoney(tx.amount)}</span></td>
                <td>${isIncome ? 'إيراد' : 'مصروف'}</td>
                <td><button class="btn-delete" onclick="deleteTransaction(${index})">حذف 🗑️</button></td>
            </tr>`;
            // نستخدم prepend (أو إضافة في البداية) ليظهر الأحدث فوق
            tableBody.insertAdjacentHTML('afterbegin', row); 
        });
    }

    form.addEventListener('submit', function(e) {
        e.preventDefault();

        const desc = document.getElementById('desc').value;
        const amount = parseFloat(document.getElementById('amount').value);
        const type = document.getElementById('type').value;
        const date = new Date().toLocaleDateString('ar-EG', { year: 'numeric', month: 'long', day: 'numeric' });

        transactions.push({ desc, amount, type, date });
        
        renderTable();
        updateDashboard();
        form.reset();
        document.getElementById('desc').focus();
    });

    // تحميل البيانات عند فتح الصفحة
    renderTable();
    updateDashboard();

</script>

</body>
</html>
